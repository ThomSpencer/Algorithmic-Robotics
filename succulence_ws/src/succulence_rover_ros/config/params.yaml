# ====================================================================
# Succulence Rover — Algorithmic Robotics Lab Parameters
# ====================================================================
#
# To switch between virtual and physical robots, change the topic names
# and frame names below. Both configurations are provided — uncomment
# the one you need.
#
# ====================================================================


# ====================================================================
# Week 5: Motion Model Node (Dead Reckoning)
# ====================================================================
motion_model:
  ros__parameters:
    # --- Input topic ---
    # === Virtual robot (Gazebo / simulation) ===
    odom_topic: "/succulence/odom"
    # === Physical robot (TurtleBot) ===
    # odom_topic: "/odom"

    # --- Output topics ---
    dead_reckoning:
      odometry_topic: "/succulence/dead_reckoning/odometry"
      path_topic: "/succulence/dead_reckoning/path"

    # --- Frame names ---
    frames:
      # === Virtual robot ===
      odom_frame: "succulence/odom"
      base_link_frame: "succulence/base_link"
      # === Physical robot ===
      # odom_frame: "odom"
      # base_link_frame: "base_link"
      map_frame: "map"

    # --- Lidar mounting offset (base_link → lidar) ---
    # Set these to match your robot's TF. Default (0, 0, 0) works for
    # both the Unity sim and TurtleBot (lidar aligned with base_link).
    # If your lidar is mounted offset or rotated, set these accordingly.
    lidar:
      x_offset: 0.0        # metres forward from base_link
      y_offset: 0.0        # metres left from base_link
      yaw_offset: 0.0      # radians CCW from base_link forward

    # --- Alpha noise parameters ---
    # These model how odometry uncertainty grows with robot motion.
    # Larger values = faster uncertainty growth = more ghost walls.
    # See Probabilistic Robotics (Thrun et al., 2005), Table 5.3.
    motion_model:
      alpha1: 0.1     # translation variance from translation (wheel slip)
      alpha2: 0.05    # translation variance from rotation
      alpha3: 0.05    # rotation variance from translation
      alpha4: 0.2     # rotation variance from rotation
      max_trajectory_length: 1000


# ====================================================================
# Week 5: Occupancy Grid Mapper Node
# ====================================================================
occupancy_grid_mapper:
  ros__parameters:
    # --- Topics ---
    # === Virtual robot ===
    scan_topic: "/succulence/scan"
    # === Physical robot ===
    # scan_topic: "/scan"

    odom_topic: "/succulence/dead_reckoning/odometry"
    map_topic: "/succulence/map/odom_only"

    # --- Map publishing rate ---
    map_publish_rate: 1.0   # Hz

    # --- Grid parameters ---
    # 10x linear extent vs the original (50x35m -> 500x350m). Resolution
    # coarsened from 0.05 to 0.10 to keep cell count and RAM tractable
    # (5000x3500 = 17.5M cells, ~70MB float32 grid, ~17MB per OccupancyGrid
    # publish). For finer resolution you'd need to either shrink the area
    # or accept much higher memory + RViz load.
    occupancy_grid:
      resolution: 0.10       # metres per cell
      width: 1250            # cells (125m total width)
      height: 875            # cells (87.5m total height)
      origin_x: -62.5        # metres (grid covers -62.5 to +62.5 in x)
      origin_y: -43.75       # metres (grid covers -43.75 to +43.75 in y)
      log_odds_occupied: 0.85
      log_odds_free: 0.4
      log_odds_max: 5.0
      log_odds_min: -5.0
      max_range: 12.0        # metres (ignore readings beyond this)
      min_range: 0.1         # metres (ignore readings closer than this)

    # --- Lidar mounting offset (base_link → lidar) ---
    lidar:
      x_offset: 0.0
      y_offset: 0.0
      yaw_offset: 0.0


# ====================================================================
# Week 7: SLAM Node
# ====================================================================
slam_node:
  ros__parameters:
    # --- Input topics ---
    # === Virtual robot ===
    scan_topic: "/succulence/scan"
    odom_topic: "/succulence/odom"
    # === Physical robot ===
    # scan_topic: "/scan"
    # odom_topic: "/odom"

    # --- Output topics ---
    map_topic: "/succulence/map"
    slam_odometry_topic: "/succulence/slam/odometry"
    slam_path_topic: "/succulence/slam/path"

    # --- Keyframe selection ---
    slam:
      keyframe_distance: 0.2   # smaller -> less drift between keyframes -> matcher window can keep up
      keyframe_angle: 0.15
      optimization_interval: 5 # validated default. Wobble we previously chased to interval=1
                               # was actually saturated/borderline scan-matches feeding biased
                               # corrections; the saturation gate + min_score is the right lever,
                               # not optimising more often.
      num_iterations: 10       # G-N converges in <10 iters once the graph is healthy
      map_publish_interval: 2.0  # seconds
      scan_match_cov_xy: 0.005
      scan_match_cov_theta: 0.003

    # --- Lidar mounting offset (same as occupancy_grid_mapper) ---
    lidar:
      x_offset: 0.0
      y_offset: 0.0
      yaw_offset: 0.0

    # --- Motion model (internal to SLAM node) ---
    # Tuned empirically against the sim's injected sensor noise: 10x the
    # Week-5 values. With anything smaller, odometry edges dominate the
    # optimiser and scan-match corrections (which actually carry useful info)
    # get ignored. These give odom and scan-match comparable weight so the
    # graph actually moves toward scan-aligned poses.
    motion_model:
      alpha1: 0.1     # translation variance from translation (wheel slip)
      alpha2: 0.05    # translation variance from rotation
      alpha3: 0.05    # rotation variance from translation
      alpha4: 0.2     # rotation variance from rotation

    # --- Scan matcher (window widened to keep up with sim sensor noise) ---
    # Logs were saturating shifts at +-0.15: the true correction was outside the
    # window, so matches were silently being clipped to the boundary and feeding
    # biased constraints to the optimiser. Tripling the linear search window and
    # doubling the angular window. Resolution coarsened from 0.03 to 0.05 so the
    # candidate count stays tractable.
    scan_matcher:
      search_x: 0.5            # 0.8 was tested -- false-peak saturation just moved
      search_y: 0.5            # to the new boundary. Tighter window restricts the
      search_theta: 0.25       # damage when scan correlation is unreliable.
      resolution_x: 0.05
      resolution_y: 0.05
      resolution_theta: 0.04   # 0.02 doubled candidate count for marginal angular precision
      min_score: 0.3           # validated default. 0.5 starves the graph of scan-match edges
                               # under sim noise; the saturation gate filters bad matches instead.
      local_grid_size: 500
      local_grid_resolution: 0.05

    # --- Occupancy grid (matches occupancy_grid_mapper above) ---
    occupancy_grid:
      resolution: 0.10
      width: 1250
      height: 875
      origin_x: -62.5
      origin_y: -43.75
      log_odds_occupied: 0.85
      log_odds_free: 0.4
      log_odds_max: 5.0
      log_odds_min: -5.0
      max_range: 12.0
      min_range: 0.1


# ====================================================================
# Phase 5: A* Path Planner
# ====================================================================
planner_node:
  ros__parameters:
    # --- Topics ---
    map_topic: "/succulence/map"
    odom_topic: "/succulence/slam/odometry"
    plan_topic: "/succulence/plan"

    # --- Frames ---
    frames:
      map_frame: "map"

    # --- Planning parameters ---
    planning:
      replan_period: 1.0              # seconds between replans
      occupancy_threshold: 50         # 0..100; cells >= this are obstacles
      treat_unknown_as_obstacle: true # safer while the map is still growing
      inflation_radius_cells: 2       # ~20 cm inflation at 0.10 m/cell

    # --- Hardcoded goal (Kevin's location) ---
    goal:
      x: 10.0      # metres, in the map frame
      y: 5.0       # metres, in the map frame


# ====================================================================
# Phase 6: Pure-Pursuit Navigator
# ====================================================================
navigator_node:
  ros__parameters:
    # --- Topics ---
    plan_topic: "/succulence/plan"
    odom_topic: "/succulence/slam/odometry"
    cmd_vel_topic: "/cmd_vel"

    # --- Controller parameters ---
    control:
      rate_hz: 20.0                   # control loop rate
      lookahead: 0.6                  # metres — pure-pursuit lookahead distance
      max_linear_v: 0.4               # m/s
      max_angular_v: 1.2              # rad/s
      goal_tolerance: 0.25            # metres — declare arrival within this radius
      plan_timeout: 2.0               # seconds of no plan -> emergency stop
